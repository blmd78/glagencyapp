name: Ingestion spenders (quotidien)

# Scrape CRM spenders : transactions de la veille (/team/money) + état de toutes les
# conversations (/chat/init par modèle). Hors du Worker Cloudflare : la boucle
# switch-creator × 16 modèles dépasse les 50 sous-requêtes/invocation du plan Free.
on:
  schedule:
    # 23h40 UTC — après le run chatteurs (23h05) : les transactions de la veille sont figées.
    - cron: '40 23 * * *'
  workflow_dispatch:
    inputs:
      from:
        description: 'Jour de début (YYYY-MM-DD) — vide = hier'
        required: false
      to:
        description: 'Jour de fin (YYYY-MM-DD) — vide = même que début'
        required: false

concurrency:
  group: spenders
  cancel-in-progress: false

jobs:
  spenders:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Scrape spenders
        run: pnpm --filter @glagency/ingestion spenders ${{ inputs.from }} ${{ inputs.to }}
        env:
          MYPULS_EMAIL: ${{ secrets.MYPULS_EMAIL }}
          MYPULS_PASSWORD: ${{ secrets.MYPULS_PASSWORD }}
          MYPULS_API_KEY: ${{ secrets.MYPULS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
