# Cron d'ingestion MyPuls → Supabase (remplace le Worker Cloudflare : plan Free CF = 10 ms
# CPU, insuffisant pour le parsing cheerio ; GitHub Actions est gratuit et sans limite CPU).
# Secrets requis (repo → Settings → Secrets and variables → Actions) :
#   SUPABASE_URL, SUPABASE_SECRET_KEY, MYPULS_EMAIL, MYPULS_PASSWORD, MYPULS_API_KEY
# ⚠️ GitHub désactive le cron après 60 jours sans commit (email d'alerte, ré-activable en 1 clic).
name: Ingestion MyPuls

on:
  # Objectif : 23h49 Paris TOUTE L'ANNÉE. GitHub cron est en UTC et ignore l'heure d'été,
  # donc on met 2 lignes (les mois sont disjoints → jamais de double run) :
  #   - avril→octobre  : été  (CEST, UTC+2) → 21h49 UTC = 23h49 Paris
  #   - nov→mars       : hiver (CET,  UTC+1) → 22h49 UTC = 23h49 Paris
  # Les ~2 semaines autour des bascules DST (fin mars / fin octobre) peuvent être à 1 h
  # près — sans impact (run nocturne, jour rattrapé la nuit suivante). Minute :49 (pas :00)
  # car le cron GitHub est best-effort et sature au top de l'heure.
  schedule:
    - cron: '49 21 * 4-10 *'
    - cron: '49 22 * 1-3,11-12 *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Jour précis YYYY-MM-DD (vide = rattrapage auto depuis le dernier jour connu)'
        required: false

concurrency: ingestion

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # lit `packageManager` du package.json racine
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @glagency/ingestion start ${{ inputs.day }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          MYPULS_EMAIL: ${{ secrets.MYPULS_EMAIL }}
          MYPULS_PASSWORD: ${{ secrets.MYPULS_PASSWORD }}
          MYPULS_API_KEY: ${{ secrets.MYPULS_API_KEY }}
