name = "glagency-ingestion"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
# nodejs_compat : fournit process, node:crypto (randomUUID), Buffer… utilisés par le code
# métier + supabase-js. Le parsing money-team utilise HTMLRewriter (natif runtime), PAS cheerio.
compatibility_flags = ["nodejs_compat"]

# Cron Trigger (UTC). 21:49 UTC = 23h49 Paris en ÉTÉ (CEST). ⚠️ GitHub/Cloudflare cron
# ignorent l'heure d'été → 2 lignes (mois disjoints) pour rester à 23h49 Paris toute l'année :
#   avril→octobre : été  (UTC+2) → 21h49 UTC   |   nov→mars : hiver (UTC+1) → 22h49 UTC
# Le pipeline rattrape aussi du dernier jour connu → aujourd'hui ; idempotent (upsert).
[triggers]
crons = ["49 21 * 4-10 *", "49 22 * 1-3,11-12 *"]

# PAS de [limits] cpu_ms : cette directive exige le plan Paid (erreur 100328 sur Free).
# Sur le plan Free, la limite par défaut de 10 ms CPU/invocation s'applique. Le parser
# money-team a été réécrit en HTMLRewriter (streaming natif) pour tenir dans ce budget —
# cheerio (~110 ms) ne passerait pas. CPU réel à surveiller dans les métriques du dashboard.

# --- Secrets à injecter AVANT le 1er run (jamais dans ce fichier ni dans git) ---
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SECRET_KEY
#   wrangler secret put MYPULS_EMAIL
#   wrangler secret put MYPULS_PASSWORD
#   wrangler secret put MYPULS_API_KEY
#   wrangler secret put TRIGGER_TOKEN   # optionnel : autorise le déclenchement manuel par HTTP
# NE PAS mettre DATABASE_URL (inutile au Worker : supabase-js parle en REST via SUPABASE_URL).
