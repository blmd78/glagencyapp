name = "glagency-ingestion"
# Compte Cloudflare cible VERROUILLÉ (benoitgasnier.pro@gmail.com) — empêche un déploiement
# accidentel sur un autre compte si le CLI est logué ailleurs (ex. holyware2000).
account_id = "091614e14d100aaca55e45c25011d4a8"
main = "src/worker.ts"
compatibility_date = "2024-11-01"
# nodejs_compat : fournit process, node:crypto (randomUUID), Buffer… utilisés par le code
# métier + supabase-js. Le parsing money-team utilise HTMLRewriter (natif runtime), PAS cheerio.
compatibility_flags = ["nodejs_compat"]

# Cron Trigger : 23h05 UTC toute l'année = 00h05 Paris l'hiver, 01h05 Paris l'été —
# toujours APRÈS minuit Paris et après le snapshot abonnés MyPuls de 23h59 → la journée
# capturée est COMPLÈTE. Une seule ligne : l'ancien découpage été/hiver par mois entiers
# (« 4-10 » / « 1-3,11-12 ») laissait un trou la dernière semaine d'octobre (la bascule a
# lieu le DERNIER dimanche du mois) où le run partait à 23h05 Paris, AVANT minuit → jour
# partiel. À 23h05 UTC, la date UTC = la journée Paris qui vient de finir (été comme
# hiver) → le rattrapage « dernier jour connu → aujourd'hui(UTC) » la capture bien.
# Idempotent (upsert). ⚠️ Aligné avec MONITOR_CONFIG dans src/worker.ts — modifier les 2.
# 23h20 UTC : pipeline MARKETING liens de tracking · 23h35 UTC : pipeline MARKETING
# comptes Instagram (Apify) — invocations séparées du run chatteurs pour rester sous
# les 50 sous-requêtes/invocation du plan Free.
[triggers]
crons = ["5 23 * * *", "20 23 * * *", "35 23 * * *"]

# Workers Logs (gratuit en Free : 200k événements/jour partagés par compte, rétention
# 3 jours, recherche dans le dashboard). L'historique durable des runs = table ingest_runs.
[observability]
enabled = true
head_sampling_rate = 1

# PAS de [limits] cpu_ms : cette directive exige le plan Paid (erreur 100328 sur Free).
# Sur le plan Free, la limite par défaut de 10 ms CPU/invocation s'applique. Le parser
# money-team a été réécrit en HTMLRewriter (streaming natif) pour tenir dans ce budget —
# cheerio (~110 ms) ne passerait pas. CPU réel à surveiller dans les métriques du dashboard.

# --- Secrets à injecter AVANT le 1er run (jamais dans ce fichier ni dans git) ---
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_SECRET_KEY
#   wrangler secret put MYPULS_EMAIL
#   wrangler secret put MYPULS_PASSWORD
#   wrangler secret put MYPULS_API_KEY
#   wrangler secret put TRIGGER_TOKEN   # optionnel : autorise le déclenchement manuel par HTTP
#   wrangler secret put SENTRY_DSN      # watcher : erreurs + cron monitor (absent → SDK inactif)
# NE PAS mettre DATABASE_URL (inutile au Worker : supabase-js parle en REST via SUPABASE_URL).
